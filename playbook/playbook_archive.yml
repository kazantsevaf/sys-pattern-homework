---
- name: Download and extract Apache Kafka
  hosts: localhost
  gather_facts: no
  vars:
    kafka_version: "3.6.0"
    scala_version: "2.13"
    archive_name: "kafka_{{ kafka_version }}-{{ scala_version }}.tgz"
    download_url: "https://archive.apache.org/dist/kafka/{{ kafka_version }}/kafka_{{ scala_version }}-{{ kafka_version }}.tgz"
    dest_dir: "/tmp/kafka_extracted"
    dest_archive: "/tmp/{{ archive_name }}"

  tasks:
    - name: Create destination directory
      ansible.builtin.file:
        path: "{{ dest_dir }}"
        state: directory

    - name: Download Kafka archive
      ansible.builtin.get_url:
        url: "{{ download_url }}"
        dest: "{{ dest_archive }}"
        mode: '0644'

    - name: Extract archive
      ansible.builtin.unarchive:
        src: "{{ dest_archive }}"
        dest: "{{ dest_dir }}"
        remote_src: yes
        creates: "{{ dest_dir }}/kafka_{{ scala_version }}-{{ kafka_version }}/LICENSE"